<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- Hexagone France stylisé -->
  <path d="M195,15 C235,20 270,40 295,75 C320,110 335,160 330,210 C328,255 320,295 300,330 C280,360 250,385 215,400 C195,408 175,410 155,405 C125,395 100,375 80,345 C60,315 50,275 50,230 C50,185 55,145 70,110 C85,75 110,45 140,25 C155,18 175,13 195,15 Z"
        fill="rgba(255,255,255,0.05)"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="1.5"/>

  <!-- Points groupes locaux : Paris, Lyon, Marseille, Saint-Etienne, Toulouse -->
  <!-- Paris -->
  <g>
    <circle cx="208" cy="115" r="10" fill="#E10F1A" opacity="0.3">
      <animate attributeName="r" values="10;18;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="208" cy="115" r="6" fill="#E10F1A"/>
    <text x="220" y="119" fill="#fff" font-size="11" font-family="Inter,sans-serif" font-weight="600">Paris</text>
  </g>

  <!-- Lyon -->
  <g>
    <circle cx="245" cy="235" r="8" fill="#E10F1A" opacity="0.3">
      <animate attributeName="r" values="8;15;8" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="235" r="5" fill="#E10F1A"/>
    <text x="257" y="239" fill="#fff" font-size="11" font-family="Inter,sans-serif" font-weight="600">Lyon</text>
  </g>

  <!-- Saint-Etienne -->
  <g>
    <circle cx="225" cy="255" r="5" fill="#FFD23F"/>
    <text x="155" y="259" fill="#fff" font-size="10" font-family="Inter,sans-serif" font-weight="500">Saint-Étienne</text>
  </g>

  <!-- Marseille -->
  <g>
    <circle cx="245" cy="335" r="8" fill="#E10F1A" opacity="0.3">
      <animate attributeName="r" values="8;15;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="335" r="5" fill="#E10F1A"/>
    <text x="257" y="339" fill="#fff" font-size="11" font-family="Inter,sans-serif" font-weight="600">Marseille</text>
  </g>

  <!-- Toulouse -->
  <g>
    <circle cx="155" cy="320" r="8" fill="#E10F1A" opacity="0.3">
      <animate attributeName="r" values="8;15;8" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="320" r="5" fill="#E10F1A"/>
    <text x="100" y="324" fill="#fff" font-size="11" font-family="Inter,sans-serif" font-weight="600">Toulouse</text>
  </g>

  <!-- Autres points (groupes en formation) -->
  <circle cx="115" cy="180" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="170" cy="80" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="280" cy="155" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="290" cy="270" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="180" cy="260" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="100" cy="250" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="135" cy="350" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="200" cy="380" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="305" cy="360" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="135" cy="135" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="240" cy="190" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="195" cy="210" r="3" fill="rgba(255,255,255,0.5)"/>
</svg>
