<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="fr-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(225,15,26,0.20)"/>
    </linearGradient>
    <filter id="fr-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#E10F1A" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- France métropolitaine — contours géographiques approximés -->
  <path filter="url(#fr-shadow)" d="
    M 252,38 L 240,42 L 230,50 L 220,62 L 215,75
    L 200,80 L 185,82 L 168,90 L 150,105
    L 130,120 L 115,135 L 100,148
    L 95,160 L 110,168 L 128,178
    L 142,192 L 145,212
    L 142,232 L 148,260 L 158,285
    L 168,300 L 158,315 L 142,335
    L 158,348 L 180,358 L 205,362 L 230,365
    L 258,365 L 285,360 L 308,348
    L 332,335 L 352,322 L 365,302
    L 368,278 L 372,250 L 385,225
    L 398,195 L 410,165 L 415,140
    L 408,118 L 395,100 L 378,88
    L 360,78 L 345,70 L 328,60
    L 310,52 L 290,46 L 270,40 Z
    M 100,148 L 88,158 L 80,170 L 92,180 L 100,168 Z
  " fill="url(#fr-grad)" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Corse -->
  <path d="M 412,378 Q 422,372 428,380 L 432,400 Q 430,418 422,425 Q 414,422 410,408 L 408,395 Q 406,385 412,378 Z"
        fill="url(#fr-grad)" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Frontières internes (rivières/régions) en pointillés très subtils -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-dasharray="3,4">
    <path d="M 248,135 Q 280,180 300,260"/>   <!-- Seine + Rhône -->
    <path d="M 145,235 Q 200,260 250,290"/>    <!-- Loire/Garonne -->
  </g>

  <!-- Points groupes principaux -->
  <!-- Paris -->
  <g>
    <circle cx="248" cy="125" r="16" fill="#E10F1A" opacity="0.4">
      <animate attributeName="r" values="16;26;16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0;0.45" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="248" cy="125" r="8" fill="#E10F1A" stroke="#fff" stroke-width="2.5"/>
    <text x="262" y="129" fill="#fff" font-size="14" font-family="Inter,sans-serif" font-weight="700">Paris</text>
  </g>

  <!-- Lyon -->
  <g>
    <circle cx="312" cy="255" r="13" fill="#E10F1A" opacity="0.4">
      <animate attributeName="r" values="13;22;13" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0;0.45" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="312" cy="255" r="7" fill="#E10F1A" stroke="#fff" stroke-width="2.5"/>
    <text x="325" y="259" fill="#fff" font-size="13" font-family="Inter,sans-serif" font-weight="700">Lyon</text>
  </g>

  <!-- Saint-Étienne -->
  <g>
    <circle cx="290" cy="275" r="6" fill="#FFD23F" stroke="#fff" stroke-width="1.5"/>
    <text x="180" y="280" fill="#fff" font-size="11" font-family="Inter,sans-serif" font-weight="600">St-Étienne</text>
  </g>

  <!-- Marseille -->
  <g>
    <circle cx="318" cy="345" r="13" fill="#E10F1A" opacity="0.4">
      <animate attributeName="r" values="13;22;13" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0;0.45" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="318" cy="345" r="7" fill="#E10F1A" stroke="#fff" stroke-width="2.5"/>
    <text x="331" y="349" fill="#fff" font-size="13" font-family="Inter,sans-serif" font-weight="700">Marseille</text>
  </g>

  <!-- Toulouse -->
  <g>
    <circle cx="218" cy="335" r="13" fill="#E10F1A" opacity="0.4">
      <animate attributeName="r" values="13;22;13" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0;0.45" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="218" cy="335" r="7" fill="#E10F1A" stroke="#fff" stroke-width="2.5"/>
    <text x="135" y="339" fill="#fff" font-size="13" font-family="Inter,sans-serif" font-weight="700">Toulouse</text>
  </g>

  <!-- Antennes locales -->
  <g fill="rgba(255,255,255,0.7)" stroke="rgba(225,15,26,0.5)" stroke-width="1">
    <circle cx="270" cy="55" r="4"/>     <!-- Lille -->
    <text x="278" y="58" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Lille</text>

    <circle cx="395" cy="125" r="4"/>    <!-- Strasbourg -->
    <text x="402" y="128" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Strasbourg</text>

    <circle cx="160" cy="195" r="4"/>    <!-- Nantes -->
    <text x="115" y="198" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Nantes</text>

    <circle cx="170" cy="285" r="4"/>    <!-- Bordeaux -->
    <text x="115" y="288" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Bordeaux</text>

    <circle cx="115" cy="155" r="4"/>    <!-- Brest -->
    <text x="78" y="158" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Brest</text>

    <circle cx="160" cy="160" r="4"/>    <!-- Rennes -->
    <text x="120" y="163" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Rennes</text>

    <circle cx="290" cy="190" r="4"/>    <!-- Dijon -->
    <text x="298" y="193" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Dijon</text>

    <circle cx="248" cy="225" r="4"/>    <!-- Clermont -->
    <text x="190" y="228" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Clermont</text>

    <circle cx="278" cy="328" r="4"/>    <!-- Montpellier -->
    <text x="285" y="332" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Montpellier</text>

    <circle cx="358" cy="320" r="4"/>    <!-- Nice -->
    <text x="365" y="324" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Nice</text>

    <circle cx="200" cy="105" r="4"/>    <!-- Caen -->
    <text x="208" y="108" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Caen</text>

    <circle cx="320" cy="98" r="4"/>     <!-- Reims -->
    <text x="328" y="101" fill="rgba(255,255,255,0.65)" font-size="9" font-family="Inter,sans-serif">Reims</text>
  </g>

  <!-- Légende -->
  <g transform="translate(15,470)">
    <circle cx="0" cy="0" r="6" fill="#E10F1A" stroke="#fff" stroke-width="1.5"/>
    <text x="14" y="4" fill="rgba(255,255,255,0.9)" font-size="11" font-family="Inter,sans-serif" font-weight="600">Groupes principaux</text>
    <circle cx="155" cy="0" r="3.5" fill="rgba(255,255,255,0.7)" stroke="rgba(225,15,26,0.5)" stroke-width="1"/>
    <text x="166" y="4" fill="rgba(255,255,255,0.9)" font-size="11" font-family="Inter,sans-serif" font-weight="600">Antennes locales</text>
  </g>
</svg>
